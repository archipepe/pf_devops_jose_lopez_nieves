services:
  symfony-php-nginx-service:
    image: ${REGISTRY}/${SYMFONY_APP_IMAGE}
    # image: mysymfony/php-nginx:4.1
    ports:
      - "80:80"
    volumes:
      - ../php-nginx/symfony-app:/var/www/html
    depends_on:
      - mysql-service
  mysql-service:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
