services:
  symfony-php-nginx-service:
    image: ${REGISTRY}/${SYMFONY_APP_IMAGE}
    # image: mysymfony/php-nginx:4.1
    environment:
      OTEL_PHP_AUTOLOAD_ENABLED: true
      OTEL_SERVICE_NAME: mi-tienda-symfony
      OTEL_RESOURCE_ATTRIBUTES: service.version=1.0.0,deployment.environment=dev
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_PROPAGATORS: baggage,tracecontext
    ports:
      - "80:80"
    volumes:
      - ../php-nginx/symfony-app:/var/www/html
    depends_on:
      - mysql-service
      - otel-collector

  mysql-service:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  otel-collector:
    image: otel/opentelemetry-collector:0.135.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../monitoring/opentelemetry/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.8.2
    command: [ "--config.file=/etc/tempo.yaml" ]
    volumes:
      - ../monitoring/tempo/tempo-config.yaml:/etc/tempo.yaml
      - ../monitoring/tempo/tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # API

  loki:
    image: grafana/loki:3.5.5
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.5.0
    volumes:
      - ../monitoring/prometheus/prometheus-config.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--web.enable-remote-write-receiver"
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
      - node-exporter

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  grafana:
    image: grafana/grafana:12.1.1
    volumes:
      - ../monitoring/grafana/provisioning/datasources/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  mysql_data:
  prometheus_data: {}
