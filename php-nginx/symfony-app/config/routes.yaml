index:
    path: /
    controller: App\Controller\DefaultController::index

producto_index:
    path: /productos
    controller: App\Controller\ProductosController::index

producto_detalle:
    path: /producto/{idProducto}
    controller: App\Controller\ProductosController::detalle

error_test:
    path: /error-test
    controller: App\Controller\ErrorController::error

app_login:
    path: /login
    controller: App\Controller\SecurityController::login

app_logout:
    path: /logout
    controller: App\Controller\SecurityController::logout

app_register:
    path: /register
    controller: App\Controller\RegistrationController::register

health_check:
    path: /health
    controller: App\Controller\HealthController::check

carrito_index:
    path: /carrito
    controller: App\Controller\CarritoController::index

carrito_add:
    path: /carrito/add/{id}
    methods: POST
    controller: App\Controller\CarritoController::add

carrito_update:
    path: /carrito/update/{id}
    methods: POST
    controller: App\Controller\CarritoController::update

carrito_remove:
    path: /carrito/remove/{id}
    methods: POST
    controller: App\Controller\CarritoController::remove

carrito_clear:
    path: /carrito/clear
    methods: POST
    controller: App\Controller\CarritoController::clear
