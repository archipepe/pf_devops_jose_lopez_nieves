apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-deployment
  namespace: symfony-ns
  labels:
    app: symfony-app
    version: v1
spec:
  replicas: 2 # Revisar sticky sessions en el ingress y en AWS ALB
  selector:
    matchLabels:
      app: symfony-app
      version: v1
  template:
    metadata:
      labels:
        app: symfony-app
        version: v1
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule # Or 'ScheduleAnyway' if you prefer availability over strict separation
          labelSelector:
            matchLabels:
              app: symfony-app

      # volumes:
      #   - name: app-logs
      #     persistentVolumeClaim:
      #       claimName: symfony-pvc

      containers:
        - name: php-nginx-container
          image: public.ecr.aws/l7n5d2e2/mysymfony/php-nginx:6.0-debug # TODO: último intento dio error: exec format error
          imagePullPolicy: IfNotPresent
          env:
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: symfony-secret
            #       key: DATABASE_URL
            # - name: APP_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: symfony-app-secret
            #       key: APP_SECRET
            - name: DATABASE_URL
              value: mysql://root:XjesGl0qzB7CZNuW@mysql-service:3306/app?serverVersion=8.0&charset=utf8mb4
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_ZONE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/zone']
            - name: APP_ENV
              value: dev
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 80
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          #   timeoutSeconds: 3
          #   failureThreshold: 2
          # volumeMounts:
          #   - name: app-logs
          #     mountPath: /var/www/html/var/log
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
