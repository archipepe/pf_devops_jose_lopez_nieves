apiVersion: apps/v1
kind: Deployment
metadata:
  name: symfony-deployment
  namespace: symfony-ns
  labels:
    app: symfony-app
    version: v1
spec:
  replicas: 1 # Revisar sticky sessions en el ingres y en AWS ALB
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: symfony-app
      version: v1
  template:
    metadata:
      labels:
        app: symfony-app
        version: v1
    spec:
      # IMPORTANTE: Usar el mismo UID/GID del access point
      # Con esto el código de initContainers genera error, se comenta, pero puedes hacer un intento futuro
      # securityContext:
      #   fsGroup: 1000
      #   runAsUser: 1000
      #   runAsGroup: 1000

      volumes:
        - name: app-logs
          persistentVolumeClaim:
            claimName: symfony-pvc

      # TODO: último intento dio error: exec format error
      containers:
        - name: php-nginx-container
          # TODO: por variables de entorno como en local
          image: public.ecr.aws/l7n5d2e2/mysymfony/php-nginx:4.1
          # securityContext:
          #   runAsUser: 1000
          #   runAsGroup: 1000
          imagePullPolicy: IfNotPresent
          env:
            # - name: DATABASE_URL
            #   valueFrom:
            #     secretKeyRef:
            #       name: symfony-secret
            #       key: DATABASE_URL
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 80
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 80
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
          #   timeoutSeconds: 3
          #   failureThreshold: 2
          volumeMounts:
            - name: app-logs
              mountPath: /var/www/html/var/log
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
