# k8s/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: symfony-ns

resources:
  - namespaces/namespace-symfony.yaml
  - secrets/secret-mysql.yaml
  - secrets/secret-symfony.yaml
  - configmaps/configmap-mysql.yaml
  - volumes/local/pvc-mysql.yaml
  - volumes/local/pvc-symfony.yaml
  - deployments/local/deployment-mysql.yaml
  - services/local/service-mysql.yaml
  - deployments/local/deployment-symfony.yaml
  - services/local/service-nginx.yaml
  - ingresses/local/ingress-symfony.yaml
