apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: symfony-ns
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi # Uso inicial de 200M, ir ajustando conforme vayas terminando
      
  storageClassName: mysql-sc # Usar la StorageClass definida en ebs.tf
