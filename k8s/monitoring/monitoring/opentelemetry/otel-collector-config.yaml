receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  prometheus:
    endpoint: 0.0.0.0:9464
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
  otlphttp/logs:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp, debug]
      processors: [batch]
    metrics:
      receivers: [otlp]
      exporters: [prometheus, debug]
      processors: [batch]
    logs:
      receivers: [otlp]
      exporters: [debug, otlphttp/logs]
      processors: [batch]
