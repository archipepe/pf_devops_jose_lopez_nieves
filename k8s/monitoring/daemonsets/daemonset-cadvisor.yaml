apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor-daemonset
  namespace: monitoring-ns
  labels:
    app: cadvisor-app
    version: v1
spec:
  selector:
    matchLabels:
      app: cadvisor-app
      version: v1
  template:
    metadata:
      labels:
        app: cadvisor-app
        version: v1
    spec:
      hostNetwork: true
      
      volumes:
      - name: rootfs
        hostPath:
          path: /
          type: Directory
      - name: var-run
        hostPath:
          path: /var/run
          type: Directory
      - name: sys
        hostPath:
          path: /sys
          type: Directory
      - name: docker
        hostPath:
          path: /var/lib/docker
          type: Directory
      - name: dev-disk
        hostPath:
          path: /dev/disk
      
      containers:
      - name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.49.1
        volumeMounts:
          - name: rootfs
            mountPath: /rootfs
            readOnly: true
          - name: var-run
            mountPath: /var/run
          - name: sys
            mountPath: /sys
            readOnly: true
          - name: docker
            mountPath: /var/lib/docker
            readOnly: true
          - name: dev-disk
            mountPath: /dev/disk
            readOnly: true
        ports:
          - containerPort: 8080
            name: http
