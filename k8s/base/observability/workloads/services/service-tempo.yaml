apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring-ns
  labels:
    app: tempo-app
    version: v1
spec:
  selector:
    app: tempo-app
  ports:
    - port: 4317
      targetPort: 4317
      name: grpc
    - port: 4318
      targetPort: 4318
      name: http-otlp
    - port: 3200
      targetPort: 3200
      name: http
  type: ClusterIP
